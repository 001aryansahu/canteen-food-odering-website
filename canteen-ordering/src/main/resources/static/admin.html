<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; margin: 16px; }
    h2 { margin-bottom: 8px; }
    section { margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border: 1px solid #ddd; text-align: left; vertical-align: middle; }
    input, button { padding: 8px; margin: 4px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill { padding: 2px 8px; border-radius: 999px; background: #eee; }
    .muted { color: #666; font-size: 13px; }
    .controls { display:flex; gap:8px; }
    .btn { border: 0; padding: 6px 10px; border-radius:6px; cursor:pointer; }
    .btn-primary { background:#3399cc; color:#fff; }
    .btn-danger { background:#e04b4b; color:#fff; }
    .btn-ghost { background:#f1f1f1; }
    .small { font-size:13px; padding:4px 8px; }
    #message { margin-bottom: 12px; height:18px; color: #0a6; }
    #error { margin-bottom: 12px; height:18px; color: #c00; }
  </style>
</head>
<body>
  <h2>🍳 Admin Panel</h2>

  <div id="message" aria-live="polite"></div>
  <div id="error" aria-live="assertive"></div>

  <section>
    <h3>Products</h3>
    <div class="row">
      <input id="pname" placeholder="Name" />
      <input id="pprice" type="number" step="0.01" placeholder="Price" />
      <input id="pcat" placeholder="Category" />
      <input id="pimg" type="file" accept="image/*" />
      <button class="btn btn-primary" onclick="addProduct()">Add</button>
    </div>

    <table id="ptable" aria-live="polite">
      <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Cat</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h3>Orders</h3>
    <table id="otable">
      <thead>
        <tr><th>OrderId</th><th>Token</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script>
    const $ = sel => document.querySelector(sel);
    const setMsg = (txt='') => { $('#message').textContent = txt; $('#error').textContent = ''; };
    const setErr = (txt='') => { $('#error').textContent = txt; $('#message').textContent = ''; };

    async function loadProducts() {
      try {
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error('Failed to fetch products: ' + res.status);
        const data = await res.json();
        const tb = document.querySelector('#ptable tbody');
        tb.innerHTML = '';
        data.forEach(p => {
          const tr = document.createElement('tr');
       tr.innerHTML = `
  <td>${p.id}</td>
  <td>
    <img src="${p.imageUrl}" alt="${escapeHtml(p.name)}" width="40" style="vertical-align:middle;margin-right:6px;">
    ${escapeHtml(p.name)}
  </td>
  <td>₹${p.price}</td>
  <td>${escapeHtml(p.category ?? '')}</td>
  <td class="controls">
    <button class="btn btn-ghost small" onclick='editProduct(${p.id})'>Edit</button>
    <button class="btn btn-danger small" onclick="delProduct(${p.id})">Delete</button>
  </td>
`;

          tb.appendChild(tr);
        });
        setMsg(`Loaded ${data.length} products`);
      } catch (err) {
        console.error(err);
        setErr('Could not load products. Check server console or CORS.');
      }
    }
async function addProduct() {
  setMsg('Saving product…');
  setErr('');

  const name = document.getElementById('pname').value.trim();
  const price = parseFloat(document.getElementById('pprice').value || '0');
  const category = document.getElementById('pcat').value.trim();
  const fileInput = document.getElementById('pimg');
  const file = fileInput.files[0];

  if (!name) { setErr('Name is required'); return; }
  if (!file) { setErr('Image file is required'); return; }

  const formData = new FormData();
  formData.append('name', name);
  formData.append('price', price);
  formData.append('category', category);
  formData.append('image', file);   // 👈 send file as "image"

  try {
    const res = await fetch('/api/products/upload', {
      method:'POST',
      body: formData
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error('Server: ' + res.status + ' ' + text);
    }
    // clear inputs
    document.getElementById('pname').value = '';
    document.getElementById('pprice').value = '';
    document.getElementById('pcat').value = '';
    document.getElementById('pimg').value = '';
    await loadProducts();
    setMsg('Product added');
  } catch (err) {
    console.error(err);
    setErr('Add product failed — see console');
  }
}

    async function delProduct(id) {
      if (!confirm('Delete product #' + id + '?')) return;
      try {
        const res = await fetch(`/api/products/${id}`, { method:'DELETE' });
        if (!res.ok) throw new Error('Delete failed: ' + res.status);
        await loadProducts();
        setMsg('Product deleted');
      } catch (err) {
        console.error(err);
        setErr('Delete failed — check server');
      }
    }

    // Edit flow: prompt for new values (simple)
    async function editProduct(id) {
      try {
        const res = await fetch(`/api/products`);
        const products = await res.json();
        const p = products.find(x => x.id === id);
        if (!p) { setErr('Product not found'); return; }
        const name = prompt('Name', p.name);
        if (name === null) return; // cancelled
        const price = prompt('Price', p.price);
        if (price === null) return;
        const category = prompt('Category', p.category || '');
        if (category === null) return;
        const imageUrl = prompt('Image URL', p.imageUrl || '');

        const payload = { name: name.trim(), price: parseFloat(price), category: category.trim(), imageUrl: imageUrl.trim() };
        const r = await fetch(`/api/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error('Update failed: ' + r.status);
        await loadProducts();
        setMsg('Product updated');
      } catch (err) {
        console.error(err);
        setErr('Update failed — check console');
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');
        if (!res.ok) throw new Error('Failed to get orders');
        const data = await res.json();
        const tb = document.querySelector('#otable tbody');
        tb.innerHTML = '';
        data.forEach(o => {
          const items = (o.items || []).map(i => `${escapeHtml(i.productName)} x${i.quantity}`).join(', ');
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${o.id}</td>
            <td><span class="pill">#${o.tokenNumber}</span></td>
            <td>${items}</td>
            <td>₹${o.totalAmount}</td>
            <td>${o.status}</td>
            <td class="controls">
              <button class="btn small btn-ghost" onclick="setStatus(${o.id}, 'PREPARING')">Preparing</button>
              <button class="btn small btn-primary" onclick="setStatus(${o.id}, 'COMPLETED')">Completed</button>
            </td>
          `;
          tb.appendChild(tr);
        });
        setMsg(`Loaded ${data.length} orders`);
      } catch (err) {
        console.error(err);
        setErr('Could not load orders');
      }
    }

    async function setStatus(orderId, status) {
      try {
        const res = await fetch(`/api/orders/${orderId}/status?status=${encodeURIComponent(status)}`, { method:'PUT' });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error('Status update failed: ' + res.status + ' ' + txt);
        }
        await loadOrders();
        setMsg('Order status updated');
      } catch (err) {
        console.error(err);
        setErr('Could not update status');
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // init
    loadProducts();
    loadOrders();
    setInterval(loadOrders, 5000);
  </script>
